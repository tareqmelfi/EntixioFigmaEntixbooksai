name: Post-Deploy Verify
# Runs after every push to main · waits for Coolify build · validates deploy.
# If validation fails: purge CF cache + retry once · then alert.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_purge:
        description: 'Skip Cloudflare purge (debug)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      COMMIT_SHA: ${{ github.sha }}
      SKIP_PURGE: ${{ github.event.inputs.skip_purge }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Coolify build (90s)
        run: |
          echo "Waiting for Coolify to detect push and rebuild..."
          for i in 1 2 3 4 5 6 7 8 9; do
            sleep 10
            echo "  ${i}0s elapsed"
          done

      - name: Fetch live bundle hash
        id: hash
        run: |
          BUNDLE=$(curl -sS --max-time 30 https://entix.io/ | grep -oE 'index-[A-Za-z0-9_-]+\.js' | head -1 || echo "FETCH_FAILED")
          echo "bundle=$BUNDLE" >> "$GITHUB_OUTPUT"
          echo "Live bundle: $BUNDLE"
          echo "Git commit:  $COMMIT_SHA"
          if [ "$BUNDLE" = "FETCH_FAILED" ]; then
            echo "::error::Could not fetch entix.io · DNS/CDN issue?"
            exit 1
          fi

      - name: Verify API health
        run: |
          HEALTH=$(curl -sS --max-time 30 https://api.entix.io/health || echo "FAIL")
          echo "$HEALTH"
          if ! echo "$HEALTH" | grep -q '"status":"ok"'; then
            echo "::error::API health check failed"
            exit 1
          fi

      - name: Verify auth-providers endpoint
        run: |
          AUTH=$(curl -sS --max-time 30 https://api.entix.io/auth-providers || echo "FAIL")
          echo "$AUTH"
          if ! echo "$AUTH" | grep -q 'emailPassword'; then
            echo "::error::Auth providers endpoint missing"
            exit 1
          fi

      - name: Verify OCR multi-file support
        run: |
          OCR=$(curl -sS --max-time 30 https://api.entix.io/api/ocr/health || echo "FAIL")
          echo "$OCR"
          if ! echo "$OCR" | grep -q 'supportsBatch'; then
            echo "::warning::OCR build older than expected · multi-file may not work"
          fi

      - name: Purge Cloudflare cache
        if: env.SKIP_PURGE != 'true'
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_ZONE_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            echo "::warning::CF secrets not set · skipping purge"
            exit 0
          fi
          chmod +x scripts/purge-cache.sh
          ./scripts/purge-cache.sh

      - name: Re-fetch bundle hash after purge
        id: rehash
        run: |
          sleep 60
          BUNDLE2=$(curl -sS --max-time 30 -H "Cache-Control: no-cache" https://entix.io/ | grep -oE 'index-[A-Za-z0-9_-]+\.js' | head -1 || echo "FETCH_FAILED")
          echo "bundle2=$BUNDLE2" >> "$GITHUB_OUTPUT"
          echo "Post-purge bundle: $BUNDLE2"

      - name: Summary
        if: always()
        env:
          BUNDLE_PRE: ${{ steps.hash.outputs.bundle }}
          BUNDLE_POST: ${{ steps.rehash.outputs.bundle2 }}
          JOB_STATUS: ${{ job.status }}
        run: |
          {
            echo "### Post-Deploy Verify · $COMMIT_SHA"
            echo ""
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| Bundle hash (pre)  | \`$BUNDLE_PRE\` |"
            echo "| Bundle hash (post) | \`${BUNDLE_POST:-skipped}\` |"
            echo "| Job status         | $JOB_STATUS |"
          } >> "$GITHUB_STEP_SUMMARY"
