name: Post-Deploy Verify
# Runs after every push to main · waits for Coolify build · validates deploy.
# v2 (2026-05-06): retry-with-backoff for race conditions during Coolify rebuild.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_purge:
        description: 'Skip Cloudflare purge (debug)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      COMMIT_SHA: ${{ github.sha }}
      SKIP_PURGE: ${{ github.event.inputs.skip_purge }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Coolify initial build (60s)
        run: |
          echo "Initial wait for Coolify to detect push and start build..."
          sleep 60

      - name: Verify API health (poll up to 4 min)
        id: api_health
        run: |
          for attempt in 1 2 3 4 5 6 7 8; do
            HEALTH=$(curl -sS --max-time 10 https://api.entix.io/health 2>/dev/null || echo "FAIL")
            if echo "$HEALTH" | grep -q '"status":"ok"'; then
              echo "✅ API healthy on attempt $attempt: $HEALTH"
              exit 0
            fi
            echo "⏳ Attempt $attempt/8 · response: $HEALTH"
            sleep 30
          done
          echo "::error::API health check failed after 8 retries (4 min total)"
          curl -skI https://api.entix.io/health
          exit 1

      - name: Fetch live bundle hash (frontend)
        id: hash
        run: |
          for attempt in 1 2 3; do
            BUNDLE=$(curl -sS --max-time 30 -H "Cache-Control: no-cache" https://entix.io/ 2>/dev/null | grep -oE 'index-[A-Za-z0-9_-]+\.js' | head -1 || echo "")
            if [ -n "$BUNDLE" ]; then
              echo "bundle=$BUNDLE" >> "$GITHUB_OUTPUT"
              echo "✅ Live bundle: $BUNDLE (commit: $COMMIT_SHA)"
              exit 0
            fi
            echo "⏳ Attempt $attempt/3 — frontend not ready"
            sleep 20
          done
          echo "::error::Could not fetch entix.io frontend"
          exit 1

      - name: Verify auth-providers endpoint
        run: |
          for attempt in 1 2 3; do
            AUTH=$(curl -sS --max-time 15 https://api.entix.io/auth-providers 2>/dev/null || echo "FAIL")
            if echo "$AUTH" | grep -q 'emailPassword'; then
              echo "✅ Auth providers OK"
              exit 0
            fi
            echo "⏳ Attempt $attempt/3: $AUTH"
            sleep 20
          done
          echo "::warning::Auth providers endpoint not ready (non-blocking)"

      - name: Verify OCR multi-file support
        continue-on-error: true
        run: |
          OCR=$(curl -sS --max-time 15 https://api.entix.io/api/ocr/health 2>/dev/null || echo "FAIL")
          echo "$OCR"
          if ! echo "$OCR" | grep -q 'supportsBatch'; then
            echo "::warning::OCR build older than expected · multi-file may not work"
          fi

      - name: Purge Cloudflare cache
        if: env.SKIP_PURGE != 'true' && success()
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_ZONE_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            echo "::warning::CF secrets not set · skipping purge"
            exit 0
          fi
          chmod +x scripts/purge-cache.sh
          ./scripts/purge-cache.sh

      - name: Re-fetch bundle hash after purge
        id: rehash
        if: success()
        run: |
          sleep 30
          BUNDLE2=$(curl -sS --max-time 30 -H "Cache-Control: no-cache" https://entix.io/ 2>/dev/null | grep -oE 'index-[A-Za-z0-9_-]+\.js' | head -1 || echo "FETCH_FAILED")
          echo "bundle2=$BUNDLE2" >> "$GITHUB_OUTPUT"
          echo "Post-purge bundle: $BUNDLE2"

      - name: Summary
        if: always()
        env:
          BUNDLE_PRE: ${{ steps.hash.outputs.bundle }}
          BUNDLE_POST: ${{ steps.rehash.outputs.bundle2 }}
          JOB_STATUS: ${{ job.status }}
        run: |
          {
            echo "### Post-Deploy Verify · $COMMIT_SHA"
            echo ""
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| Bundle hash (pre)  | \`${BUNDLE_PRE:-not-fetched}\` |"
            echo "| Bundle hash (post) | \`${BUNDLE_POST:-skipped}\` |"
            echo "| Job status         | $JOB_STATUS |"
          } >> "$GITHUB_STEP_SUMMARY"
